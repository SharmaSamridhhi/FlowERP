name: CI

# Verifies every PR and every push to main: lint, type-check, tests (with
# coverage, against a real Postgres service container) and build. No
# deploy step here — see specs/FLO-022-cd-automation.md for that; keeping
# CI (verify) and CD (ship) separate is deliberate.
#
# Recommended: enable branch protection on `main` requiring this workflow
# to pass before merging. That's a GitHub repository setting, not
# something this file can configure — left for the user to turn on.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowerp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Backend integration tests run against this real, ephemeral
      # database (see specs/FLO-011-auth-rbac.md) — never mocked.
      # DATABASE_URL also satisfies what backend's postinstall (`prisma
      # generate`) needs to load its config.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/flowerp_ci"
      TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/flowerp_ci"
      JWT_SECRET: "ci-jwt-secret-not-for-production-use"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # Also builds packages/shared (root's "prepare" script) and
        # generates the backend's Prisma client (backend's "postinstall"
        # script) — both required by the steps below.
        run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate:deploy -w backend

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
